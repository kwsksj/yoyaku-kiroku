<html lang="ja" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <base target="_top" />
    <script>
      // debug=true のときのみデバッグログを有効化
      (function setServerDebugModeFromQuery() {
        try {
          var queryParams = new URLSearchParams(window.location.search);
          window.SERVER_DEBUG_MODE = queryParams.get('debug') === 'true';
        } catch (_error) {
          window.SERVER_DEBUG_MODE = false;
        }
      })();
    </script>
    <title>きぼりの よやく・きろく 川崎誠二木彫り教室</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      /* Courier Prime のフォントメトリクスを日本語フォントに合わせて調整 */
      @font-face {
        font-family: 'Courier Prime Adjusted';
        src: url(https://fonts.gstatic.com/s/courierprime/v11/u-450q2lgwslOqpF_6gQ8kELWwY.ttf)
          format('truetype');
        font-weight: 400;
        font-display: swap;
        ascent-override: 85%;
        descent-override: 15%;
        line-gap-override: 0%;
        size-adjust: 120%;
      }
      @font-face {
        font-family: 'Courier Prime Adjusted';
        src: url(https://fonts.gstatic.com/s/courierprime/v11/u-4k0q2lgwslOqpF_6gQ8kELY7pMf-c.ttf)
          format('truetype');
        font-weight: 700;
        font-display: swap;
        ascent-override: 85%;
        descent-override: 15%;
        line-gap-override: 0%;
        size-adjust: 120%;
      }
      :root {
        --brand-text: #4e342e;
        --brand-bg: #fffdf5;
      }
      body {
        font-family:
          'Courier Prime Adjusted', 'Zen Kaku Gothic New', sans-serif;
        font-feature-settings: 'tnum' 1;
        font-variant-numeric: tabular-nums;
        color: var(--brand-text);
        background-color: var(--brand-bg);
        line-height: 1.6;
      }
      /* ワイド表示（参加者/ログ） */
      #app.app-wide {
        max-width: 1280px;
      }
      /* プレースホルダの透明度 */
      input::placeholder {
        opacity: 0.6;
      }
      /* フォーム要素はフォントを継承しないので明示的に指定 */
      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }
      .markdown-content h1,
      .markdown-content h2,
      .markdown-content h3 {
        margin-top: 1.2em;
        margin-bottom: 0.6em;
        font-weight: bold;
      }
      .markdown-content h1 {
        font-size: 1.5em;
      }
      .markdown-content h2 {
        font-size: 1.25em;
      }
      .markdown-content h3 {
        font-size: 1.1em;
      }
      .markdown-content p {
        margin-bottom: 1em;
      }
      .markdown-content ul {
        list-style-type: disc;
        margin-left: 1.5em;
        margin-bottom: 1em;
      }
      .markdown-content li {
        margin-bottom: 0.25em;
      }
      .markdown-content a {
        color: #2563eb; /* blue-600 */
        text-decoration: underline;
      }
      .markdown-content strong {
        font-weight: bold;
      }

      /* アコーディオンアニメーション */
      @keyframes slideDown {
        from {
          opacity: 0;
          max-height: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          max-height: 5000px;
          transform: translateY(0);
        }
      }

      .animate-slideDown {
        animation: slideDown 0.3s ease-out forwards;
      }

      /* スクロールバーを非表示にするクラス */
      .scrollbar-hide {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Opera */
      }
    </style>
  </head>

  <body class="bg-brand-bg h-full">
    <!-- デバッグ情報表示エリア（本番環境では非表示） -->

    <!-- アプリケーションのメインコンテナ -->
    <div id="app" class="container mx-auto px-4">
      <!-- ローディング画面 -->
      <div
        id="loading"
        class="loading-fade fixed inset-0 flex flex-col items-center justify-center z-50"
      >
        <div class="spinner mb-5"></div>
        <p
          id="loading-message"
          class="text-brand-text text-xl leading-relaxed text-center max-w-xl px-4"
        >
          アプリケーションを読み込み中...
        </p>
      </div>

      <!-- メインコンテンツ -->
      <main id="main-content" class="py-6 embedded-no-padding">
        <div id="view-container"></div>
      </main>

      <!-- モーダルオーバーレイ -->
      <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content">
          <div id="modal-body"></div>
        </div>
      </div>

      <!-- カスタムモーダル -->
      <div
        id="custom-modal"
        class="fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center z-50"
        onclick="if (event.target === this) hideModal();"
      >
        <div class="bg-white rounded-lg p-6 max-w-sm mx-4">
          <h3 id="modal-title" class="text-lg font-bold mb-4"></h3>
          <div id="modal-message" class="mb-6"></div>
          <div id="modal-buttons" class="flex gap-3 justify-end"></div>
        </div>
      </div>
      <footer
        class="text-center text-xs text-brand-muted mt-6 pt-2 pb-4 border-t-2 border-brand-muted/20"
        style="padding-bottom: 15vh"
      >
        <p>きぼりの よやく・きろく</p>
        <p class="mt-1 opacity-70">
          <span
            id="privacy-policy-link"
            data-action="showPrivacyPolicy"
            class="text-brand-muted underline hover:text-brand-text cursor-pointer"
            >プライバシーポリシー</span
          >
        </p>
        <p class="mt-3 text-[10px] opacity-50">
          <span id="app-version"></span> · Made by KAWASAKI Seiji
        </p>
      </footer>
    </div>

    <!-- __UNIFIED_JAVASCRIPT_INJECTION_POINT__ -->

    <script>
      // デバッグ情報をコンソールに出力する関数（本番環境では無効化）

      // 最初のテスト - これが表示されなければHTMLファイル自体が読み込まれていない
      debugLog('HTMLファイル読み込み確認テスト完了');
      debugLog('ページURL: ' + window.location.href);

      // GAS環境かどうかを判定
      const isGAS =
        typeof google !== 'undefined' && typeof google.script !== 'undefined';
      debugLog('GAS環境判定: ' + isGAS);

      function isPreloadedDataValid() {
        if (!window.appCache.initialData || !window.appCache.timestamp) {
          return false;
        }

        var age = Date.now() - window.appCache.timestamp;
        return age < window.appCache.maxAge;
      }

      function initializeApp() {
        debugLog('initializeApp実行開始');
        debugLog('isGAS: ' + isGAS);

        // 最適化された初期化チェック（アプローチ2改良版）
        function safeInitializeApp() {
          // 必要なコンポーネントの確認
          var allReady = true;
          var missingComponents = [];

          if (typeof DesignConfig === 'undefined') {
            allReady = false;
            missingComponents.push('DesignConfig');
          }
          if (typeof window.stateManager === 'undefined') {
            allReady = false;
            missingComponents.push('stateManager');
          }
          if (
            typeof window.stateManager !== 'undefined' &&
            typeof window.stateManager.dispatch !== 'function'
          ) {
            allReady = false;
            missingComponents.push('stateManager.dispatch');
          }
          if (typeof hideLoading !== 'function') {
            allReady = false;
            missingComponents.push('hideLoading');
          }

          debugLog(
            '初期化条件チェック - 不足: ' + missingComponents.join(', '),
          );

          if (allReady) {
            // 全て準備完了 - 即座に初期化実行
            debugLog('⚡ 高速初期化実行 - 全コンポーネント準備完了！');
            debugLog(
              'stateManager.getState().lessons: ' +
                (window.stateManager.getState().lessons
                  ? window.stateManager.getState().lessons.length + '件'
                  : 'null'),
            );

            // 復元された状態をチェックして適切な画面に遷移
            var restoredState = window.stateManager.getState();
            if (restoredState.currentUser) {
              // ログイン済みユーザーがいる場合は復元されたビューへ（なければダッシュボード）
              debugLog(
                '✅ セッション復元: ' + restoredState.currentUser.nickname,
              );
              window.stateManager.dispatch({
                type: 'SET_STATE',
                payload: { view: restoredState.view || 'dashboard' },
              });
            } else {
              window.stateManager.dispatch({
                type: 'SET_STATE',
                payload: { view: 'login' },
              });
            }

            // データ再取得が必要な場合はhideLoadingを呼ばない
            // （window.onload でデータ再取得後に呼ばれる）
            var needsRefresh =
              typeof window.stateManager.needsDataRefresh === 'function' &&
              window.stateManager.needsDataRefresh();

            // ビュー変更リスナーのセットアップ（PC表示対応等）
            if (typeof appWindow.setupViewListener === 'function') {
              appWindow.setupViewListener();
            } else {
              console.warn('⚠️ setupViewListener not found');
            }

            if (!needsRefresh) {
              hideLoading();
            } else {
              debugLog('🔄 データ再取得が必要 - ローディング継続');
            }
          } else {
            // 一部未準備 - 100ms間隔でリトライ（300ms → 100ms に短縮）
            setTimeout(safeInitializeApp, 100);
          }
        }

        // 最適化された初期化開始
        safeInitializeApp();
      }

      if (isGAS) {
        // GAS本番環境のみ初期化
        window.addEventListener('DOMContentLoaded', () => {
          initializeApp();

          // フッターにバージョン情報を表示
          const versionEl = document.getElementById('app-version');
          if (versionEl && typeof CONSTANTS !== 'undefined') {
            versionEl.textContent =
              'v' + (CONSTANTS.ENVIRONMENT?.APP_VERSION || '---');
          }
        });
      }
    </script>
  </body>
</html>
